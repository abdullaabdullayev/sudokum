<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sudokum</title>
    <link rel="stylesheet" href="/css/sign-up.css">
    <link rel="icon" type="image/x-icon" href="/icons/pastime.png">
</head>
<body>
<div class="wrapper">
<h2>CREATE NEW USER</h2>
<form id="userForm">
    <label for="username"></label><input type="text" id="username" placeholder="Username" required><br><br>
    <label for="email"></label><input type="email" id="email" placeholder="Email" required><br><br>
    <label for="password"></label><input type="password" id="password" placeholder="Password" required><br><br>
    <button type="submit">Sign Up</button>
    <div class="auth-footer">
        <p>Do you already have an account?<a href="/users/log-in" class="login-link-btn">Log In</a></p>
    </div>
    <p id="responseMessage"></p>
</form>
</div>
<script src="/scripts/script.js"></script>
</body>
</html>
